<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tagr.io</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
    />
    <link rel="icon" type="image/png" href="favicon-32x32.png" />
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        background-color: #0a0a0a;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
        font-family: "Press Start 2P", monospace;
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.15) 2px,
          rgba(0, 0, 0, 0.15) 4px
        );
        pointer-events: none;
      }

      /* ───── INTRO SCREEN ───── */
      .title {
        font-size: 160px;
        color: #ffffff;
        font-family: "Press Start 2P", monospace;
        text-shadow:
          4px 0 0 #e8000d,
          0 4px 0 #e8000d,
          4px 4px 0 #e8000d,
          8px 4px 0 rgba(232, 0, 13, 0.4),
          4px 8px 0 rgba(232, 0, 13, 0.4),
          8px 8px 0 rgba(232, 0, 13, 0.2);
        animation: titlePulse 3s ease-in-out infinite;
      }
      .screen {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
      }
      .flavor {
        font-size: 9px;
        color: #ffffff;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }
      @keyframes titlePulse {
        0%,
        100% {
          text-shadow:
            4px 0 0 #e8000d,
            0 4px 0 #e8000d,
            4px 4px 0 #e8000d,
            8px 4px 0 rgba(232, 0, 13, 0.4),
            4px 8px 0 rgba(232, 0, 13, 0.4),
            8px 8px 0 rgba(232, 0, 13, 0.2);
        }
        50% {
          text-shadow:
            4px 0 0 #e8000d,
            0 4px 0 #e8000d,
            4px 4px 0 #e8000d,
            8px 4px 0 rgba(232, 0, 13, 0.7),
            4px 8px 0 rgba(232, 0, 13, 0.7),
            8px 8px 0 rgba(232, 0, 13, 0.5),
            0 0 40px rgba(232, 0, 13, 0.3);
        }
      }
      .play_button {
        font-family: "Press Start 2P", monospace;
        font-size: 14px;
        color: #ffffff;
        background: transparent;
        border: none;
        cursor: pointer;
        letter-spacing: 0.1em;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%,
        49% {
          opacity: 1;
        }
        50%,
        100% {
          opacity: 0;
        }
      }
      .play_button:hover {
        animation: none;
        color: #e8000d;
      }
      .corner {
        position: fixed;
        width: 48px;
        height: 48px;
        border-color: rgba(232, 0, 13, 0.4);
        border-style: solid;
      }
      .one {
        top: 24px;
        left: 24px;
        border-width: 3px 0 0 3px;
      }
      .two {
        top: 24px;
        right: 24px;
        border-width: 3px 3px 0 0;
      }
      .three {
        bottom: 24px;
        left: 24px;
        border-width: 0 0 3px 3px;
      }
      .four {
        bottom: 24px;
        right: 24px;
        border-width: 0 3px 3px 0;
      }
      .red-bar {
        display: flex;
        gap: 4px;
        justify-content: center;
        flex-direction: row;
      }
      .red-bar span {
        height: 8px;
        background: #e8000d;
        display: block;
      }
      .red-bar span:nth-child(1) {
        width: 8px;
      }
      .red-bar span:nth-child(2) {
        width: 16px;
      }
      .red-bar span:nth-child(3) {
        width: 32px;
      }
      .red-bar span:nth-child(4) {
        width: 64px;
      }
      .red-bar span:nth-child(5) {
        width: 128px;
      }
      .red-bar span:nth-child(6) {
        width: 64px;
      }
      .red-bar span:nth-child(7) {
        width: 32px;
      }
      .red-bar span:nth-child(8) {
        width: 16px;
      }
      .red-bar span:nth-child(9) {
        width: 8px;
      }

      /* ───── GAME SCREEN ───── */
      #game-screen {
        display: none;
        width: 100vw;
        height: 100vh;
      }
      canvas {
        display: block;
        background-color: #000000;
      }
    </style>
  </head>
  <body>
    <div class="corner one"></div>
    <div class="corner two"></div>
    <div class="corner three"></div>
    <div class="corner four"></div>

    <div id="intro-screen">
      <div class="screen">
        <div class="title-wrapper">
          <div class="title">TAG</div>
        </div>
        <div class="red-bar">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
        </div>
        <p class="flavor">
          2 players &nbsp;-&nbsp; one tags &nbsp;-&nbsp; one runs
        </p>
        <button class="play_button" onclick="startGame()">
          - click to play -
        </button>
      </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen">
      <canvas id="gameCanvas"></canvas>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
    <script>
      function startGame() {
        document.getElementById("intro-screen").style.display = "none";
        document.getElementById("game-screen").style.display = "block";
      }
    </script>
  </body>
</html>
